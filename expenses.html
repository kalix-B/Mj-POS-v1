<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ POS - Expenses Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script>
        checkAuth();
    </script>
</head>
<body>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand-section">
                <span class="brand-icon">🏪</span>
                <span class="brand-name">MJ POS</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html"><span>🛍️</span><span>Sales Screen</span></a></li>
                <li class="nav-item"><a href="inventory.html"><span>📦</span><span>Inventory</span></a></li>
                <li class="nav-item"><a href="gcash.html"><span>💙</span><span>GCash Services</span></a></li>
                <li class="nav-item active"><a href="expenses.html"><span>💰</span><span>Expenses</span></a></li>
                <li class="nav-item"><a href="reports.html"><span>📈</span><span>Reports</span></a></li>
            </ul>
            <div class="user-profile">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Store Manager</span>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn"><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Expenses Tracker</h1>
                    <p>Record monthly bills and operating costs</p>
                </div>
                <div class="header-clock" id="liveClock">Loading...</div>
            </header>

            <div class="manager-layout">
                <section class="inventory-form glass-panel">
                    <h3>Add New Expense</h3>
                    <form id="expenseForm">
                        <div class="form-group">
                            <label for="expDesc">Description</label>
                            <input type="text" id="expDesc" placeholder="e.g., Electric Bill" required>
                        </div>
                        <div class="form-group">
                            <label for="expAmount">Amount (₱)</label>
                            <input type="number" step="0.01" id="expAmount" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="expCategory">Category</label>
                            <input type="text" id="expCategory" list="expCategories" placeholder="Rent, Utilities, etc." required>
                            <datalist id="expCategories">
                                <option>Rent</option>
                                <option>Utilities</option>
                                <option>Supplies</option>
                                <option>Salaries</option>
                                <option>Marketing</option>
                                <option>Miscellaneous</option>
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label for="expDate">Date</label>
                            <input type="date" id="expDate" required>
                        </div>
                        <input type="hidden" id="editExpenseId" value="">
                        <button type="submit" class="btn-primary" id="submitExpenseBtn">Add Expense</button>
                        <button type="button" class="btn-secondary" id="cancelExpenseBtn" style="display:none;" onclick="cancelExpenseEdit()">Cancel Edit</button>
                    </form>
                </section>

                <section class="inventory-table-panel">
                    <div class="table-responsive">
                        <table class="custom-table">
                            <thead>
                                <tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="expensesTableBody"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        let expenses = [];
        let editMode = false;

        async function initExpenses() {
            startClock();
            await loadExpenses();
        }

        function startClock() {
            function update() {
                const now = new Date();
                const options = { weekday:'short', year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' };
                document.getElementById('liveClock').textContent = now.toLocaleDateString('en-US', options);
            }
            update(); setInterval(update,1000);
        }

        async function loadExpenses() {
            // Get current month's start & end to show recent expenses (optional)
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = new Date(today.getFullYear(), today.getMonth()+1, 0).toISOString().split('T')[0];
            expenses = await getExpenses(firstDay, lastDay);
            renderExpensesTable();
        }

        function renderExpensesTable() {
            const tbody = document.getElementById('expensesTableBody');
            tbody.innerHTML = '';
            if (expenses.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No expenses recorded this month.</td></tr>`;
                return;
            }
            expenses.forEach(exp => {
                tbody.innerHTML += `
                    <tr>
                        <td>${exp.date}</td>
                        <td>${exp.description}</td>
                        <td>${exp.category}</td>
                        <td>₱${Number(exp.amount).toFixed(2)}</td>
                        <td>
                            <button class="btn-icon edit-btn" onclick="editExpense(${exp.id})">✏️</button>
                            <button class="btn-icon delete-btn" onclick="deleteExpenseRecord(${exp.id})">🗑️</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const description = document.getElementById('expDesc').value.trim();
            const amount = parseFloat(document.getElementById('expAmount').value);
            const category = document.getElementById('expCategory').value.trim();
            const date = document.getElementById('expDate').value;
            const editId = document.getElementById('editExpenseId').value;

            if (!description || isNaN(amount) || !category || !date) return alert("Please fill all fields");

            if (editId) {
                await updateExpense(editId, { description, amount, category, date });
            } else {
                await addExpense({ description, amount, category, date });
            }
            await loadExpenses();
            cancelExpenseEdit();
        });

        function editExpense(id) {
            const exp = expenses.find(e => e.id === id);
            if (!exp) return;
            document.getElementById('expDesc').value = exp.description;
            document.getElementById('expAmount').value = exp.amount;
            document.getElementById('expCategory').value = exp.category;
            document.getElementById('expDate').value = exp.date;
            document.getElementById('editExpenseId').value = exp.id;
            document.getElementById('submitExpenseBtn').textContent = "Update Expense";
            document.getElementById('cancelExpenseBtn').style.display = 'block';
            editMode = true;
        }

        function cancelExpenseEdit() {
            document.getElementById('expenseForm').reset();
            document.getElementById('editExpenseId').value = '';
            document.getElementById('submitExpenseBtn').textContent = "Add Expense";
            document.getElementById('cancelExpenseBtn').style.display = 'none';
            editMode = false;
        }

        async function deleteExpenseRecord(id) {
            if (confirm("Delete this expense?")) {
                await deleteExpense(id);
                await loadExpenses();
                if (editMode && document.getElementById('editExpenseId').value == id) cancelExpenseEdit();
            }
        }

        initExpenses();
    </script>
</body>
</html>
