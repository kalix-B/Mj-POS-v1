<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ POS - Sales Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script>
        checkAuth();
    </script>
</head>
<body onload="initScreen()">
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand-section">
                <span class="brand-icon">🏪</span>
                <span class="brand-name">MJ POS</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="index.html">
                        <span class="brand-icon">🛍️</span>
                        <span>Sales Screen</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="inventory.html">
                        <span class="brand-icon">📦</span>
                        <span>Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="gcash.html">
                        <span class="brand-icon">💙</span>
                        <span>GCash Services</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reports.html">
                        <span class="brand-icon">📈</span>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>

            <div class="user-profile">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Store Manager</span>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Sales Terminal</h1>
                    <p>Process checkout operations and search items</p>
                </div>
                <div class="header-clock" id="liveClock">Loading...</div>
            </header>

            <div class="pos-layout">
                <section class="catalog-section">
                    <div class="catalog-controls">
                        <div class="search-bar-container">
                            <input type="text" id="searchInput" placeholder="Search products by name..." oninput="filterProducts()">
                        </div>
                    </div>

                    <div class="category-filters" id="categoryTabs">
                        <button class="category-tab active" onclick="setCategory('All')">All Items</button>
                    </div>

                    <div class="products-grid" id="productsGrid"></div>
                </section>

                <section class="cart-section glass-panel">
                    <div class="cart-header">
                        <span class="cart-title">Active Order</span>
                        <button class="clear-cart" onclick="clearCart()">Clear All</button>
                    </div>

                    <div class="cart-items-container" id="cartItems">
                        <div style="text-align:center; color: var(--text-secondary); margin-top: 5rem;">
                            Cart is empty. Select products to begin.
                        </div>
                    </div>

                    <div class="cart-totals">
                        <div class="total-row">
                            <span>Subtotal</span>
                            <span id="subtotalVal">₱0.00</span>
                        </div>
                        <div class="total-row" style="align-items: center;">
                            <span>Discount (%)</span>
                            <input type="number" id="discountInput" min="0" max="100" value="0" style="width: 70px; padding: 0.25rem 0.5rem; text-align: right;" oninput="recalculateCart()">
                        </div>
                        <div class="total-row grand-total">
                            <span>Total Due</span>
                            <span class="val" id="totalDueVal">₱0.00</span>
                        </div>
                    </div>

                    <div class="cash-entry">
                        <label for="cashReceived">Cash Received</label>
                        <div class="cash-input-wrap">
                            <span>₱</span>
                            <input type="number" id="cashReceived" min="0" placeholder="0.00" oninput="calculateChange()">
                        </div>
                        <div class="total-row" style="margin-top: 0.5rem; font-weight: 600;">
                            <span>Change Due</span>
                            <span id="changeDueVal" style="color: var(--accent-emerald);">₱0.00</span>
                        </div>
                    </div>

                    <button onclick="checkoutOrder()" class="btn-primary checkout-btn">Complete Sale</button>
                </section>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="receiptModal">
        <div class="modal-box glass-panel">
            <div class="receipt-wrapper" id="receiptContent"></div>
            <div class="modal-actions">
                <button onclick="closeReceiptModal()" class="btn-secondary">Close</button>
                <button onclick="window.print()" class="btn-primary">Print Slip</button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = "All";
        let cart = [];
        let inventory = [];

        async function initScreen() {
            startClock();
            try {
                inventory = await getInventory();
                const categories = await getCategories();
                renderCategoryTabs(categories);
                renderProducts();
            } catch (err) {
                console.error("System configuration failure:", err);
            }
        }

        function startClock() {
            function updateClock() {
                const now = new Date();
                const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                document.getElementById('liveClock').textContent = now.toLocaleDateString('en-US', options);
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        function renderCategoryTabs(categories = []) {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = `<button class="category-tab ${currentCategory === 'All' ? 'active' : ''}" onclick="setCategory('All')">All Items</button>`;
            categories.forEach(cat => {
                container.innerHTML += `<button class="category-tab ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`;
            });
        }

        async function setCategory(cat) {
            currentCategory = cat;
            try {
                inventory = await getInventory();
                const categories = await getCategories();
                renderCategoryTabs(categories);
                renderProducts();
            } catch (err) {
                console.error("Error upgrading content filters:", err);
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const searchVal = document.getElementById('searchInput').value.toLowerCase();

            const filtered = inventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchVal);
                const itemCat = item.category ? item.category.trim().toLowerCase() : "general";
                const currentCatSelected = currentCategory.trim().toLowerCase();
                const matchesCategory = currentCategory === "All" || itemCat === currentCatSelected;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: var(--text-secondary); margin-top:3rem;">No products found.</div>`;
                return;
            }

            filtered.forEach(item => {
                const displayPrice = typeof item.price === 'number' ? item.price : parseFloat(item.price) || 0;
                const displayStock = typeof item.stock === 'number' ? item.stock : parseInt(item.stock) || 0;
                const isOutOfStock = displayStock <= 0;
                
                let stockBadgeClass = 'badge-success';
                if (displayStock <= 0) {
                    stockBadgeClass = 'badge-danger';
                } else if (displayStock <= 5) {
                    stockBadgeClass = 'badge-warning';
                }

                grid.innerHTML += `
                    <div class="product-card glass-panel" onclick="${isOutOfStock ? '' : `addToCart(${item.id})`}" style="${isOutOfStock ? 'opacity: 0.55; cursor: not-allowed;' : ''}">
                        <span class="badge ${stockBadgeClass} stock-tag">${isOutOfStock ? 'Out of stock' : `Stock: ${displayStock}`}</span>
                        <div class="product-category">${item.category || 'General'}</div>
                        <div class="product-name">${item.name}</div>
                        <div class="product-price">₱${displayPrice.toFixed(2)}</div>
                    </div>
                `;
            });
        }

        function filterProducts() {
            renderProducts();
        }

        function addToCart(id) {
            const item = inventory.find(p => p.id === id);
            if (!item || item.stock <= 0) return;

            const cartItem = cart.find(c => c.id === id);
            const currentQtyInCart = cartItem ? cartItem.qty : 0;
            if (currentQtyInCart >= item.stock) {
                alert(`Cannot add more than existing stock limit (${item.stock})`);
                return;
            }

            if (cartItem) {
                cartItem.qty++;
            } else {
                cart.push({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    qty: 1,
                    category: item.category
                });
            }
            recalculateCart();
        }

        function updateCartQty(id, delta) {
            const cartItem = cart.find(c => c.id === id);
            const invItem = inventory.find(p => p.id === id);
            
            if (cartItem && invItem) {
                const targetQty = cartItem.qty + delta;
                if (targetQty > invItem.stock) {
                    alert(`Cannot exceed stock limit of ${invItem.stock}`);
                    return;
                }
                cartItem.qty = targetQty;
                if (cartItem.qty <= 0) {
                    cart = cart.filter(c => c.id !== id);
                }
            }
            recalculateCart();
        }

        function clearCart() {
            cart = [];
            document.getElementById('discountInput').value = 0;
            document.getElementById('cashReceived').value = '';
            recalculateCart();
        }

        function recalculateCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color: var(--text-secondary); margin-top: 5rem;">
                        Cart is empty. Select products to begin.
                    </div>
                `;
                document.getElementById('subtotalVal').textContent = '₱0.00';
                document.getElementById('totalDueVal').textContent = '₱0.00';
                document.getElementById('changeDueVal').textContent = '₱0.00';
                return;
            }

            container.innerHTML = '';
            let subtotal = 0;
            
            cart.forEach(item => {
                const totalItemPrice = item.price * item.qty;
                subtotal += totalItemPrice;
                
                container.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <span class="cart-item-name">${item.name}</span>
                            <span class="cart-item-price">₱${item.price.toFixed(2)} each</span>
                        </div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateCartQty(${item.id}, -1)">-</button>
                            <span style="font-weight: 600; min-width: 20px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateCartQty(${item.id}, 1)">+</button>
                            <span class="cart-item-subtotal">₱${totalItemPrice.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            });

            let discountPercent = parseFloat(document.getElementById('discountInput').value) || 0;
            if (discountPercent < 0) discountPercent = 0;
            if (discountPercent > 100) discountPercent = 100;
            document.getElementById('discountInput').value = discountPercent;

            const discountAmount = subtotal * (discountPercent / 100);
            const totalDue = subtotal - discountAmount;

            document.getElementById('subtotalVal').textContent = `₱${subtotal.toFixed(2)}`;
            document.getElementById('totalDueVal').textContent = `₱${totalDue.toFixed(2)}`;
            
            calculateChange();
        }

        function calculateChange() {
            const totalText = document.getElementById('totalDueVal').textContent.replace('₱', '');
            const totalDue = parseFloat(totalText) || 0;
            const cashVal = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = cashVal - totalDue;
            
            if (change >= 0 && totalDue > 0) {
                document.getElementById('changeDueVal').textContent = `₱${change.toFixed(2)}`;
            } else {
                document.getElementById('changeDueVal').textContent = '₱0.00';
            }
        }

        async function checkoutOrder() {
            if (cart.length === 0) {
                alert("Cannot complete transaction: Cart is empty!");
                return;
            }

            const totalText = document.getElementById('totalDueVal').textContent.replace('₱', '');
            const totalDue = parseFloat(totalText) || 0;
            const cashVal = parseFloat(document.getElementById('cashReceived').value) || 0;

            if (cashVal < totalDue) {
                alert(`Insufficient Cash! Cash received must be at least ₱${totalDue.toFixed(2)}`);
                return;
            }

            try {
                for (const cartItem of cart) {
                    const invItem = inventory.find(p => p.id === cartItem.id);
                    if (invItem) {
                        invItem.stock -= cartItem.qty;
                        await updateInventoryStock(invItem.id, invItem.stock);
                    }
                }
            } catch (err) {
                console.error("Database connection dropped during inventory mutation:", err);
            }

            const subtotalText = document.getElementById('subtotalVal').textContent.replace('₱', '');
            const subtotal = parseFloat(subtotalText) || 0;
            const discountPercent = parseFloat(document.getElementById('discountInput').value) || 0;
            const change = cashVal - totalDue;

            const newTx = {
                id: "TX-" + Date.now(),
                timestamp: new Date().toISOString(),
                cashier: "Admin User",
                items: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    qty: item.qty,
                    subtotal: item.price * item.qty
                })),
                subtotal: subtotal,
                discount: discountPercent,
                tax: 0,
                total: totalDue,
                cashReceived: cashVal,
                change: change
            };

            await addTransaction(newTx);

            const dateStr = new Date(newTx.timestamp).toLocaleString();
            let receiptItemsHtml = '';
            newTx.items.forEach(item => {
                receiptItemsHtml += `
                    <div class="receipt-line-item">
                        <span>${item.name} x${item.qty}</span>
                        <span>₱${item.subtotal.toFixed(2)}</span>
                    </div>
                `;
            });

            document.getElementById('receiptContent').innerHTML = `
                <div class="receipt-header">
                    <span class="receipt-title">🏪ELLA STORE</span>
                    <span>Sari-Sari Store, PH</span>
                    <span style="font-size:0.75rem;">Terminal ID: #001</span>
                </div>
                <div class="receipt-body">
                    <div><b>Date:</b> ${dateStr}</div>
                    <div><b>Receipt ID:</b> ${newTx.id}</div>
                    <div><b>Cashier:</b> ${newTx.cashier}</div>
                    <hr style="border: 0; border-top: 1px dashed #94a3b8; margin: 0.5rem 0;">
                    ${receiptItemsHtml}
                    <div class="receipt-totals">
                        <div class="receipt-totals-row">
                            <span>Subtotal</span>
                            <span>₱${newTx.subtotal.toFixed(2)}</span>
                        </div>
                        ${newTx.discount > 0 ? `
                            <div class="receipt-totals-row">
                                <span>Discount (${newTx.discount}%)</span>
                                <span>-₱${(newTx.subtotal * (newTx.discount/100)).toFixed(2)}</span>
                            </div>
                        ` : ''}
                        <div class="receipt-totals-row" style="font-size: 1.1rem; border-top: 1px dashed #1e293b; padding-top:0.25rem;">
                            <span>TOTAL DUE</span>
                            <span>₱${newTx.total.toFixed(2)}</span>
                        </div>
                        <hr style="border: 0; border-top: 1px dashed #94a3b8; margin: 0.5rem 0;">
                        <div class="receipt-totals-row" style="font-weight:normal;">
                            <span>Cash Tendered</span>
                            <span>₱${newTx.cashReceived.toFixed(2)}</span>
                        </div>
                        <div class="receipt-totals-row" style="font-weight:normal;">
                            <span>Change Due</span>
                            <span>₱${newTx.change.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
                <div class="receipt-footer">
                    <span>Thank You! Please Come Again.</span>
                </div>
            `;

            document.getElementById('receiptModal').classList.add('active');

            clearCart();
            try {
                inventory = await getInventory();
            } catch(e){}
            renderProducts();
        }

        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.remove('active');
        }
    </script>
</body>
</html>
